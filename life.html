					<figcaption>March 7, 2026 — A Day of Conversations and Energy

March 7, 2026 was filled with meaningful conversations and real engagement. The event had a relaxed atmosphere where people gathered, explored ideas, and interacted naturally. I spent time discussing concepts, answering questions, and connecting with students who were genuinely curious. What made the day special was the participation — people stopped, listened, and shared their thoughts. Between discussions, there were candid moments, group photos, and spontaneous interactions that captured the energy of the day. It wasn’t about one highlight, but the collective experience. A simple setup, strong conversations, and enthusiastic people turned March 7 into a memorable and motivating day.</figcaption>
				</figure>
				<figure class="masonry-item glass" data-tags="work">
					<img src="assets/c1.jpeg" alt="Weekend build log">
					<figcaption>August 18, 2025 — The Day Wagfu Was Launched

On August 18, 2025, at SCTCE Pappanamcode, the Wagfu idea was officially launched. What started as a concept evolved into a vision presented before faculty, students, and guests. The session focused on improving pet care accessibility and building a connected platform for pet owners. Presenting Wagfu for the first time felt like turning an idea into reality. The presence of the Thiruvananthapuram Assistant Collector made the moment more significant, marking the formal launch. Applause, discussions, and feedback followed, creating excitement around the concept. That day transformed Wagfu from a simple idea into the beginning of a real startup journey.
				</figure>
